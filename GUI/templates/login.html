<!DOCTYPE html>
<html>
<head>
  <title>TBox - Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
</head>
<body class="screen">
  <h1 class="brand">TBox</h1>
  <h2>Please enter your name</h2>
  <p>This name will be used for tool checkout records</p>
  <form method="POST">
    <input
      type="text"
      name="username"
      placeholder="John Doe"
      minlength="2"
      maxlength="10"
      required
      class="text-input"
    />
    <button type="submit" class="btn-primary">Check In</button>
  </form>
</body>
</html>
